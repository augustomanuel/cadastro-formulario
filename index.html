<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário de Cadastro</title>
</head>

<body>
    <!-- <h1>CADASTRO DE FORMULÁRIO</h1> -->

    <section class="menu-for formulario">
        <form>
            <h2>Faça o seu Cadastro</h2>
            <div class="inputs">

                <label for="text">Nome Completo</label><br>
                <input type="text" name="" id="" placeholder="Informe seu nome completo"><br>

                <label for="email">Email</label><br>
                <input type="email" name="" id="" placeholder="email@gmail.com"><br>

                <label for="">Telefone</label><br>
                <input type="tel" name="" id="" placeholder="945 790 622"><br>

                <label for="">Senha</label><br>
                <input type="password" name="" id="" placeholder="*********"><br>

                <label for="">Gênero</label>
                <select>
                    <option value="">Selecione seu Gênero</option>
                    <option value="">Masculino</option>
                    <option value="">Feminino</option>
                </select><br>

                <button type="submit" class="btn">Cadastrar</button>
            </div>

        </form>
    </section>

</body>

</html>
